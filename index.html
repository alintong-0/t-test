<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 节奏躲避战</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header class="hud">
      <div>分数: <span id="score">0</span></div>
      <div>等级: <span id="level">1</span></div>
      <div>护盾: <span id="shield">0</span></div>
      <div>AI 难度: <span id="aiDifficulty">1.00</span></div>
    </header>

    <section class="canvas-wrap">
      <canvas id="game" width="420" height="720" aria-label="game-canvas"></canvas>
      <div id="overlay" class="overlay show">
        <h1>AI 节奏躲避战</h1>
        <p>← / → 或 A / D 控制移动，手机可触控左右半屏。</p>
        <button id="startBtn">开始游戏</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
